networks:
  chat-net:
    driver: bridge

volumes:
  redis-data:

services:

  redis:
    image: redis:7.2-alpine
    container_name: redis
    networks: [chat-net]
    ports:
      - "6379:6379"
    command: redis-server --save 60 1
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

