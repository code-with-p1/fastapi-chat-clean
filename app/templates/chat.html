<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic RAG Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #chat-container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            height: 80vh;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-header {
            background: #007bff;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user-message {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: #e4e6eb;
            color: #050505;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            min-width: 40px;
        }
        #input-container {
            padding: 15px;
            background: #ffffff;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }
        #chat-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
        }
        #chat-input:focus {
            border-color: #007bff;
        }
        #send-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background: #0056b3;
        }
        #send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 24px;
            padding: 0 4px;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #666;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">Agentic RAG Assistant</div>
        <div id="chat-messages">
        </div>
        <div id="input-container">
            <input type="text" id="chat-input" placeholder="Ask about your documents..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        let conversationHistory = [];

        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(role === 'user' ? 'user-message' : 'bot-message');
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        // Function to inject the typing animation HTML
        function showTypingIndicator(element) {
            element.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
        }

        async function sendMessage() {
            const userText = chatInput.value.trim();
            if (!userText) return;

            // 1. Update UI for User
            appendMessage('user', userText);
            chatInput.value = '';
            sendBtn.disabled = true;
            chatInput.disabled = true;

            // 2. Add to history
            conversationHistory.push({ role: "user", content: userText });

            // 3. Create bot message bubble and instantly show typing animation
            const botMessageDiv = appendMessage('bot', '');
            showTypingIndicator(botMessageDiv);
            
            // Flag to track when we need to clear the animation
            let isFirstToken = true; 

            const system_prompt_msg = "You are a helpful and friendly, technical AI assistant.";
            const rag_use = true; 
            const db_provider = "pinecone";
            const index_name = "test-hybrid-collection";
            const dimension = 1536;
            const top_k = 10;
            const rerank_top_n = 5;

            try {
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        messages: conversationHistory,
                        system_prompt: system_prompt_msg,
                        use_rag: rag_use,
                        db_provider: db_provider,
                        index_name: index_name,
                        dimension: dimension,
                        top_k: top_k,
                        rerank_top_n: rerank_top_n
                    })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';
                let completeBotResponse = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });
                    let normalizedBuffer = buffer.replace(/\r\n/g, '\n');
                    const messages = normalizedBuffer.split('\n\n');
                    
                    buffer = messages.pop(); 

                    for (const msg of messages) {
                        const lines = msg.split('\n');
                        let currentEvent = 'message';

                        for (const line of lines) {
                            if (line.startsWith('event:')) {
                                currentEvent = line.replace('event:', '').trim();
                            } else if (line.startsWith('data:')) {
                                const dataStr = line.replace('data:', '').trim();

                                if (dataStr && currentEvent === 'token') {
                                    try {
                                        const parsedData = JSON.parse(dataStr);
                                        const tokenText = parsedData.data; 
                                        
                                        if (tokenText) {
                                            // --- NEW: Clear animation on first token ---
                                            if (isFirstToken) {
                                                botMessageDiv.innerHTML = ''; // Wipe out the dots
                                                isFirstToken = false;
                                            }

                                            // We use append() or += to build text safely
                                            const textNode = document.createTextNode(tokenText);
                                            botMessageDiv.appendChild(textNode);
                                            
                                            completeBotResponse += tokenText;
                                            chatMessages.scrollTop = chatMessages.scrollHeight;
                                        }
                                    } catch (e) {
                                        console.error("JSON Parsing Error for string:", dataStr);
                                    }
                                }
                            }
                        }
                    }
                }

                conversationHistory.push({ role: "assistant", content: completeBotResponse });

            } catch (error) {
                console.error("Fetch Error:", error);
                // If it failed before the first token, clear the animation
                if (isFirstToken) {
                    botMessageDiv.innerHTML = ''; 
                }
                botMessageDiv.textContent = 'Error: ' + error.message;
                botMessageDiv.style.color = 'red';
            } finally {
                sendBtn.disabled = false;
                chatInput.disabled = false;
                chatInput.focus();
            }
        }
    </script>
</body>
</html>
